<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Match Game</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f7f5ff; min-height: 100vh; display: flex; justify-content: center; padding: 2rem 1rem; }
    #app { width: 100%; max-width: 480px; }
    h1 { font-size: 22px; font-weight: 600; color: #26215C; margin-bottom: 1.25rem; text-align: center; letter-spacing: -0.3px; }
    #topic-bar { display: flex; gap: 7px; margin-bottom: 1rem; flex-wrap: wrap; }
    .topic-btn { font-size: 12px; padding: 5px 13px; cursor: pointer; border-radius: 6px; border: 2px solid #cccccc; background: #ffffff; color: #888888; transition: all 0.15s; font-family: inherit; }
    .topic-btn.active { border: 3px solid #000000; background: #EEEDFE; color: #26215C; font-weight: 600; }
    #header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
    #difficulty { display: flex; gap: 7px; flex-wrap: wrap; }
    .diff-btn { font-size: 12px; padding: 5px 13px; cursor: pointer; border-radius: 6px; border: 2px solid #cccccc; background: #ffffff; color: #888888; transition: all 0.15s; font-family: inherit; }
    .diff-btn.active { border: 3px solid #000000; background: #EEEDFE; color: #26215C; font-weight: 600; }
    #stats { display: flex; gap: 10px; align-items: center; }
    .stat { background: #eeeeee; border-radius: 6px; padding: 4px 11px; font-size: 12px; color: #666; }
    .stat span { font-weight: 600; color: #111; }
    #restart-btn { font-size: 12px; padding: 5px 13px; cursor: pointer; border-radius: 6px; border: 2px solid #cccccc; background: #ffffff; color: #333; font-family: inherit; }
    #restart-btn:hover { background: #f5f5f5; }
    #grid { display: grid; gap: 7px; margin-top: 0.5rem; }
    .card { aspect-ratio: 1; cursor: pointer; position: relative; }
    .card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.35s ease; }
    .card.flipped .card-inner, .card.matched .card-inner { transform: rotateY(180deg); }
    .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 8px; display: flex; align-items: center; justify-content: center; border: 1px solid #dddddd; }
    .card-front { background: #f0f0f0; }
    .card-front::after { content: '?'; font-size: 16px; font-weight: 600; color: #aaaaaa; }
    .card-back { background: #ffffff; font-size: 34px; transform: rotateY(180deg); }
    .card.matched .card-back { border: 2px solid #AFA9EC; background: #EEEDFE; }
    .confetti-piece { position: fixed; width: 6px; height: 6px; border-radius: 2px; pointer-events: none; z-index: 9999; animation: confetti-fall 0.9s ease-out forwards; }
    @keyframes confetti-fall {
      0%   { transform: translate(0,0) rotate(0deg) scale(1); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) rotate(var(--rot)) scale(0.3); opacity: 0; }
    }
    #win-screen { display: none; text-align: center; padding: 2.5rem 1rem; }
    #win-screen.show { display: block; }
    #grid.hide { display: none; }
    #win-title { font-size: 28px; font-weight: 600; color: #26215C; margin-bottom: 8px; }
    #win-sub { font-size: 14px; color: #666; margin-bottom: 1.5rem; }
    #play-again { font-size: 13px; padding: 8px 20px; cursor: pointer; border-radius: 6px; border: 2px solid #cccccc; background: #ffffff; color: #333; font-family: inherit; }
    #play-again:hover { background: #f5f5f5; }
  </style>
</head>
<body>
  <div id="app">
    <h1>🃏 Memory Match</h1>
    <div id="topic-bar">
      <button class="topic-btn active" data-topic="pets">🐾 Pets</button>
      <button class="topic-btn" data-topic="transport">🚗 Transport</button>
      <button class="topic-btn" data-topic="food">🍕 Food</button>
      <button class="topic-btn" data-topic="ocean">🌊 Ocean</button>
    </div>
    <div id="header">
      <div id="difficulty">
        <button class="diff-btn active" data-size="8">Easy</button>
        <button class="diff-btn" data-size="10">Medium</button>
        <button class="diff-btn" data-size="12">Hard</button>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <div id="stats">
          <div class="stat">Moves: <span id="moves">0</span></div>
          <div class="stat">Matched: <span id="matched">0</span></div>
        </div>
        <button id="restart-btn">Restart</button>
      </div>
    </div>
    <div id="grid"></div>
    <div id="win-screen">
      <div id="win-title">You won! 🎉</div>
      <div id="win-sub"></div>
      <button id="play-again">Play again</button>
    </div>
  </div>

  <script>
    const THEMES = {
      pets:      { emoji: ['🐶','🐱','🐰','🐹','🐾','🦜','🐠','🐇','🐈','🐕','🦮','🐩'] },
      transport: { emoji: ['🚗','✈️','🚂','🚀','🛳️','🚁','🏍️','🚲','🛺','🚜','🛻','🚌'] },
      food:      { emoji: ['🍕','🍣','🍔','🌮','🍩','🍜','🍓','🧁','🥑','🍦','🥞','🍟'] },
      ocean:     { emoji: ['🐳','🦈','🐙','🦀','🐠','🦞','🐚','🦭','🐡','🪸','🦑','🐋'] }
    };
    const CONFETTI_COLORS = ['#AFA9EC','#CECBF6','#5DCAA5','#FAC775','#ED93B1','#85B7EB','#F0997B'];

    let flipped=[], matched=0, moves=0, locked=false, totalPairs=8;
    let timer=null, started=false, seconds=0, currentTopic='pets';

    function formatTime(s) { return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }
    function shuffle(arr) {
      const a=[...arr];
      for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
      return a;
    }

    function spawnConfetti(cardEl) {
      const rect=cardEl.getBoundingClientRect();
      const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
      for(let i=0;i<16;i++){
        const p=document.createElement('div');
        p.className='confetti-piece';
        const angle=(Math.random()*360)*Math.PI/180;
        const dist=35+Math.random()*50;
        p.style.cssText=`left:${cx}px;top:${cy}px;background:${CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)]};--dx:${Math.cos(angle)*dist}px;--dy:${Math.sin(angle)*dist}px;--rot:${Math.random()*360}deg;animation-delay:${Math.random()*0.1}s;`;
        document.body.appendChild(p);
        setTimeout(()=>p.remove(),1100);
      }
    }

    function setActiveStyle(el, isActive) {
      if (isActive) {
        el.style.border = '3px solid #000000';
        el.style.background = '#EEEDFE';
        el.style.color = '#26215C';
        el.style.fontWeight = '600';
      } else {
        el.style.border = '2px solid #cccccc';
        el.style.background = '#ffffff';
        el.style.color = '#888888';
        el.style.fontWeight = '400';
      }
    }

    function init() {
      clearInterval(timer);
      seconds=0; moves=0; matched=0; flipped=[]; locked=false; started=false;
      document.getElementById('moves').textContent='0';
      document.getElementById('matched').textContent='0';
      document.getElementById('win-screen').classList.remove('show');
      document.getElementById('grid').classList.remove('hide');

      const pool=shuffle([...THEMES[currentTopic].emoji]).slice(0,totalPairs);
      const cards=shuffle([...pool,...pool]);
      const cols=totalPairs<=8?4:totalPairs<=10?5:6;
      const grid=document.getElementById('grid');
      grid.style.gridTemplateColumns=`repeat(${cols},minmax(0,80px))`;
      grid.innerHTML='';

      cards.forEach((emoji)=>{
        const card=document.createElement('div');
        card.className='card';
        card.dataset.emoji=emoji;
        card.innerHTML=`<div class="card-inner"><div class="card-front"></div><div class="card-back">${emoji}</div></div>`;
        card.addEventListener('click',onCardClick);
        grid.appendChild(card);
      });
    }

    function onCardClick(e) {
      const card=e.currentTarget;
      if(locked||card.classList.contains('flipped')||card.classList.contains('matched')) return;
      if(!started){started=true;clearInterval(timer);timer=setInterval(()=>seconds++,1000);}
      card.classList.add('flipped');
      flipped.push(card);
      if(flipped.length===2){
        locked=true; moves++;
        document.getElementById('moves').textContent=moves;
        const [a,b]=flipped;
        if(a.dataset.emoji===b.dataset.emoji){
          a.classList.add('matched'); b.classList.add('matched');
          matched++;
          document.getElementById('matched').textContent=matched;
          setTimeout(()=>{spawnConfetti(a);spawnConfetti(b);},350);
          flipped=[]; locked=false;
          if(matched===totalPairs){
            clearInterval(timer);
            setTimeout(()=>{
              document.getElementById('grid').classList.add('hide');
              document.getElementById('win-sub').textContent=`${moves} moves · ${formatTime(seconds)}`;
              document.getElementById('win-screen').classList.add('show');
            },800);
          }
        } else {
          setTimeout(()=>{a.classList.remove('flipped');b.classList.remove('flipped');flipped=[];locked=false;},900);
        }
      }
    }

    document.getElementById('restart-btn').addEventListener('click',init);
    document.getElementById('play-again').addEventListener('click',init);

    document.querySelectorAll('.diff-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        document.querySelectorAll('.diff-btn').forEach(b=>{ b.classList.remove('active'); setActiveStyle(b,false); });
        btn.classList.add('active');
        setActiveStyle(btn,true);
        totalPairs=parseInt(btn.dataset.size);
        init();
      });
    });

    document.querySelectorAll('.topic-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        document.querySelectorAll('.topic-btn').forEach(b=>{ b.classList.remove('active'); setActiveStyle(b,false); });
        btn.classList.add('active');
        setActiveStyle(btn,true);
        currentTopic=btn.dataset.topic;
        init();
      });
    });

    document.querySelectorAll('.diff-btn.active, .topic-btn.active').forEach(btn => setActiveStyle(btn,true));

    init();
  </script>
</body>
</html>
