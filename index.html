<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JenJen's MatchMatch Game</title>
  <link rel="icon" type="image/png" href="favicon1.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --lav: #7B68C8; --lav-light: #F0EEFF; --lav-border: #9B8FD8; }
    #game-wrapper { padding: 1rem 1rem 2.5rem; min-height: 100vh; background: #ffffff; position: relative; overflow: hidden; }
    @media (max-width: 600px) { #game-wrapper { padding-top: 3.5rem; } }
    .garden-deco { position: absolute; pointer-events: none; opacity: 0.7; animation: sway 4s ease-in-out infinite; }
    @keyframes sway { 0%,100%{transform:rotate(-7deg)}50%{transform:rotate(7deg)} }
    @keyframes bob { 0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)} }
    #title { font-size: 19px; font-weight: 800; color: var(--lav); text-align: center; margin-bottom: 2.2rem; letter-spacing: 0.3px; position: relative; z-index: 1; }
    #topic-bar { display: flex; gap: 6px; margin-bottom: 0.75rem; flex-wrap: wrap; position: relative; z-index: 1; }
    .topic-btn { font-size: 11px; padding: 5px 11px; cursor: pointer; border-radius: 20px; border: 1.5px solid #ddd; background: #fff; color: #999; transition: all 0.15s; font-family: lato; }
    .topic-btn.active { border: 2px solid var(--lav) !important; background: #fff !important; color: var(--lav) !important; font-weight: 700 !important; }
    #header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; flex-wrap: wrap; gap: 8px; position: relative; z-index: 1; }
    #difficulty { display: flex; gap: 6px; flex-wrap: wrap; }
    .diff-btn { font-size: 11px; padding: 5px 11px; cursor: pointer; border-radius: 20px; border: 1.5px solid #ddd; background: #fff; color: #999; transition: all 0.15s; font-family: inherit; }
    .diff-btn.active { border: 2px solid var(--lav) !important; background: #fff !important; color: var(--lav) !important; font-weight: 700 !important; }
    #stats { display: flex; gap: 8px; align-items: center; }
    .stat { background: var(--lav-light); border-radius: 20px; padding: 4px 11px; font-size: 11px; color: var(--lav); border: 1px solid var(--lav-border); }
    .stat span { font-weight: 700; }
    #restart-btn { font-size: 11px; padding: 5px 12px; cursor: pointer; border-radius: 20px; border: 1.5px solid #ddd; background: #fff; color: #555; font-family: inherit; }
    #restart-btn:hover { background: #f5f5f5; }
    #grid-wrap { display: flex; justify-content: center; position: relative; z-index: 1; margin-top: 1.4rem; padding: 0 4px; }
    #grid { display: grid; gap: 8px; width: 100%; max-width: 520px; grid-template-columns: repeat(4, 1fr); }
    #grid.cols-4 { grid-template-columns: repeat(4, 1fr); max-width: 360px; }
    #grid.cols-5 { grid-template-columns: repeat(5, 1fr); max-width: 440px; }
    #grid.cols-6 { grid-template-columns: repeat(6, 1fr); max-width: 520px; }
    .card { aspect-ratio: 1; cursor: pointer; position: relative; }
    .card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.4s cubic-bezier(.34,1.56,.64,1); }
    .card.flipped .card-inner, .card.matched .card-inner { transform: rotateY(180deg); }
    .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 16px; display: flex; align-items: center; justify-content: center; }
    .card-front { background: var(--lav-light); border: 2px solid var(--lav); box-shadow: 0 2px 8px rgba(123,104,200,0.12); font-weight: 700; color: var(--lav); font-size: clamp(16px, 5vw, 28px); }
    .card-back { background: #fff; border: 2px solid var(--lav-border); transform: rotateY(180deg); box-shadow: 0 2px 8px rgba(123,104,200,0.1); font-size: clamp(24px, 7vw, 42px); }
    .card.matched .card-back { border: 2px solid var(--lav); background: var(--lav-light); }
    .card.matched { animation: matchPop 0.4s cubic-bezier(.34,1.56,.64,1); }
    @keyframes matchPop { 0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)} }
    .confetti-piece { position: fixed; pointer-events: none; z-index: 9999; animation: confetti-fall 1s ease-out forwards; border-radius: 50%; }
    @keyframes confetti-fall { 0%{transform:translate(0,0) rotate(0deg) scale(1);opacity:1} 100%{transform:translate(var(--dx),var(--dy)) rotate(var(--rot)) scale(0.2);opacity:0} }
    .firework { position: fixed; pointer-events: none; z-index: 9998; width: 8px; height: 8px; border-radius: 50%; animation: fw 0.8s ease-out forwards; }
    @keyframes fw { 0%{transform:translate(0,0) scale(1);opacity:1} 100%{transform:translate(var(--fx),var(--fy)) scale(0);opacity:0} }
    #win-screen { display: none; text-align: center; padding: 2rem 1rem; position: relative; z-index: 1; }
    #win-screen.show { display: block; }
    #grid-wrap.hide { display: none; }
    #win-title { font-size: 26px; font-weight: 800; color: var(--lav); margin-bottom: 6px; }
    #win-sub { font-size: 13px; color: #888; margin-bottom: 1.25rem; }
    #play-again { font-size: 13px; padding: 8px 22px; cursor: pointer; border-radius: 20px; border: 1.5px solid var(--lav); background: #fff; color: var(--lav); font-family: inherit; font-weight: 600; }
    #play-again:hover { background: var(--lav-light); }
    #leaderboard { margin-top: 1.5rem; position: relative; z-index: 1; }
    #leaderboard h3 { font-size: 13px; font-weight: 700; color: var(--lav); margin-bottom: 0.6rem; text-align: center; }
    #lb-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    #lb-table th { color: var(--lav); font-weight: 700; padding: 4px 8px; text-align: left; border-bottom: 1px solid var(--lav-border); }
    #lb-table td { padding: 5px 8px; color: #555; border-bottom: 0.5px solid #ede8ff; }
    #lb-table tr:last-child td { border-bottom: none; }
    #lb-empty { font-size: 11px; color: #bbb; text-align: center; padding: 0.5rem; font-style: italic; }
    #lb-clear { display: block; margin: 0.5rem auto 0; font-size: 10px; padding: 3px 10px; cursor: pointer; border-radius: 20px; border: 1px solid #ddd; background: #fff; color: #bbb; font-family: inherit; }
    #lb-clear:hover { color: #e24b4a; border-color: #e24b4a; }
    #footer { text-align: center; font-size: 11px; color: #b0a0c8; margin-top: 1.5rem; font-style: italic; position: relative; z-index: 1; letter-spacing: 0.3px; }
    #name-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 9999; align-items: center; justify-content: center; }
    #name-modal.show { display: flex; }
    #name-box { background: #fff; border-radius: 20px; padding: 1.5rem; text-align: center; box-shadow: 0 8px 32px rgba(123,104,200,0.2); max-width: 280px; width: 90%; }
    #name-box p { font-size: 13px; color: var(--lav); font-weight: 700; margin-bottom: 0.75rem; }
    #name-box input { width: 100%; font-size: 13px; padding: 7px 12px; border-radius: 10px; border: 1.5px solid var(--lav-border); font-family: inherit; outline: none; text-align: center; }
    #name-box input:focus { border-color: var(--lav); }
    #name-submit { margin-top: 0.75rem; font-size: 12px; padding: 6px 18px; cursor: pointer; border-radius: 20px; border: 1.5px solid var(--lav); background: #fff; color: var(--lav); font-family: inherit; font-weight: 700; }
    #name-submit:hover { background: var(--lav-light); }
  </style>
</head>
<body>
<div id="game-wrapper">
  <div class="garden-deco" style="font-size:26px;top:10px;left:1%;animation-delay:0s">🌷</div>
  <div class="garden-deco" style="font-size:20px;top:10px;left:9%;animation-delay:0.3s">🐝</div>
  <div class="garden-deco" style="font-size:24px;top:10px;left:17%;animation-delay:0.6s">🌼</div>
  <div class="garden-deco" style="font-size:18px;top:10px;left:25%;animation-delay:0.9s">🦋</div>
  <div class="garden-deco" style="font-size:22px;top:10px;right:1%;animation-delay:0.4s">🌸</div>
  <div class="garden-deco" style="font-size:18px;top:10px;right:9%;animation-delay:0.7s">🐞</div>
  <div class="garden-deco" style="font-size:24px;top:10px;right:17%;animation-delay:1s">🌻</div>
  <div class="garden-deco" style="font-size:18px;top:10px;right:25%;animation-delay:1.3s">🍀</div>
  <div class="garden-deco" style="font-size:20px;top:38%;left:0.5%;animation-delay:0.5s;animation-name:bob">🌿</div>
  <div class="garden-deco" style="font-size:18px;top:58%;left:0.5%;animation-delay:1.1s;animation-name:bob">🌺</div>
  <div class="garden-deco" style="font-size:20px;top:38%;right:0.5%;animation-delay:0.8s;animation-name:bob">🌿</div>
  <div class="garden-deco" style="font-size:18px;top:58%;right:0.5%;animation-delay:1.4s;animation-name:bob">🌺</div>
  <div class="garden-deco" style="font-size:24px;bottom:5%;left:2%;animation-delay:0.2s">🌱</div>
  <div class="garden-deco" style="font-size:20px;bottom:5%;left:11%;animation-delay:0.5s">🐛</div>
  <div class="garden-deco" style="font-size:22px;bottom:5%;left:20%;animation-delay:0.8s">🌾</div>
  <div class="garden-deco" style="font-size:18px;bottom:5%;right:2%;animation-delay:0.3s">🌱</div>
  <div class="garden-deco" style="font-size:20px;bottom:5%;right:11%;animation-delay:0.6s">🐌</div>
  <div class="garden-deco" style="font-size:22px;bottom:5%;right:20%;animation-delay:0.9s">🌾</div>

  <div id="title">🌸 JenJen's MatchMatch Game 🌸</div>
  <div id="topic-bar">
    <button class="topic-btn active" data-topic="pets">🐾 Pets</button>
    <button class="topic-btn" data-topic="transport">🚗 Transport</button>
    <button class="topic-btn" data-topic="food">🍕 Food</button>
    <button class="topic-btn" data-topic="ocean">🌊 Ocean</button>
    <button class="topic-btn" data-topic="dinos">🦕 Dinosaurs</button>
    <button class="topic-btn" data-topic="flowers">🌸 Flowers</button>
    <button class="topic-btn" data-topic="holidays">🎉 Holidays</button>
  </div>
  <div id="header">
    <div id="difficulty">
      <button class="diff-btn active" data-size="8">Easy</button>
      <button class="diff-btn" data-size="10">Medium</button>
      <button class="diff-btn" data-size="12">Hard</button>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <div id="stats">
        <div class="stat">Moves: <span id="moves">0</span></div>
        <div class="stat">Matched: <span id="matched">0</span></div>
      </div>
      <button id="restart-btn">↺ Restart</button>
    </div>
  </div>
  <div id="grid-wrap"><div id="grid"></div></div>
  <div id="win-screen">
    <div id="win-title">You won! 🎉✨</div>
    <div id="win-sub"></div>
    <button id="play-again">Play again 🌸</button>
  </div>
  <div id="leaderboard">
    <h3>🏆 Best Scores</h3>
    <table id="lb-table">
      <thead><tr><th>#</th><th>Name</th><th>Theme</th><th>Difficulty</th><th>Moves</th><th>Time</th></tr></thead>
      <tbody id="lb-body"></tbody>
    </table>
    <div id="lb-empty">No scores yet — be the first! 🌸</div>
    <button id="lb-clear">Clear scores</button>
  </div>
  <div id="footer">A JenCo creation 🌷</div>
</div>

<div id="name-modal">
  <div id="name-box">
    <p>🌸 You won! Enter your name for the leaderboard:</p>
    <input id="name-input" type="text" placeholder="Your name" maxlength="20" />
    <br><button id="name-submit">Save my score ✨</button>
  </div>
</div>

<script>
const THEMES={
  pets:     {label:'Pets',      emoji:['🐶','🐱','🐰','🐹','🐻','🐼','🐨','🦊','🐸','🐭','🦝','🐷']},
  transport:{label:'Transport', emoji:['🚗','✈️','🚂','🚀','🛳️','🚁','🏍️','🚲','🛺','🚜','🛻','🚌']},
  food:     {label:'Food',      emoji:['🍕','🍣','🍔','🌮','🍩','🍜','🍓','🧁','🥑','🍦','🥞','🍟']},
  ocean:    {label:'Ocean',     emoji:['🦈','🐙','🦀','🐠','🦞','🐚','🦭','🐡','🪸','🦑','🐬','🐟']},
  dinos:    {label:'Dinosaurs', emoji:['🦕','🦖','🐉','🥚','🦴','🌋','🪨','🌿','🦎','🐊','🦷','🪺']},
  flowers:  {label:'Flowers',   emoji:['🌸','🌺','🌻','🌹','🌷','💐','🌼','🪷','🏵️','🌱','🌿','🍀']},
  holidays: {label:'Holidays',  emoji:['🎄','🎃','🎆','🐣','🎁','🎊','🕎','🎑','🧧','🎍','☃️','🎇']}
};
const CONFETTI=['#AFA9EC','#CECBF6','#5DCAA5','#FAC775','#ED93B1','#85B7EB','#F0997B','#ff9de2','#b5ead7'];
const FW_COLORS=['#ff6eb4','#ffdd57','#7ed6df','#badc58','#e056fd','#ff7979','#67e480'];
const DIFF_LABEL={8:'Easy',10:'Medium',12:'Hard'};
const LAV='#7B68C8';
let flipped=[],matched=0,moves=0,locked=false,totalPairs=8,timer=null,started=false,seconds=0,currentTopic='pets',pendingScore=null;
const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
function playFlipSound(){try{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type='sine';o.frequency.setValueAtTime(880,audioCtx.currentTime);o.frequency.exponentialRampToValueAtTime(1100,audioCtx.currentTime+0.08);g.gain.setValueAtTime(0,audioCtx.currentTime);g.gain.linearRampToValueAtTime(0.1,audioCtx.currentTime+0.01);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.18);o.start(audioCtx.currentTime);o.stop(audioCtx.currentTime+0.18);}catch(e){}}
function playMatchSound(){try{[523.25,659.25,783.99].forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type='sine';o.frequency.value=f;const t=audioCtx.currentTime+i*0.12;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.18,t+0.02);g.gain.exponentialRampToValueAtTime(0.001,t+0.3);o.start(t);o.stop(t+0.3);});}catch(e){}}
function playWinSound(){try{[523,659,784,1047].forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type='sine';o.frequency.value=f;const t=audioCtx.currentTime+i*0.18;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.2,t+0.02);g.gain.exponentialRampToValueAtTime(0.001,t+0.5);o.start(t);o.stop(t+0.5);});}catch(e){}}
function formatTime(s){return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function spawnConfetti(el){const r=el.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;for(let i=0;i<20;i++){const p=document.createElement('div');p.className='confetti-piece';const a=(Math.random()*360)*Math.PI/180,d=40+Math.random()*55,s=5+Math.random()*7;p.style.cssText=`left:${cx}px;top:${cy}px;width:${s}px;height:${s}px;background:${CONFETTI[Math.floor(Math.random()*CONFETTI.length)]};--dx:${Math.cos(a)*d}px;--dy:${Math.sin(a)*d}px;--rot:${Math.random()*540}deg;animation-delay:${Math.random()*0.1}s;`;document.body.appendChild(p);setTimeout(()=>p.remove(),1200);}}
function launchFireworks(){for(let i=0;i<90;i++){setTimeout(()=>{const fw=document.createElement('div');fw.className='firework';const x=15+Math.random()*70,y=10+Math.random()*65,a=Math.random()*Math.PI*2,d=60+Math.random()*130;fw.style.cssText=`left:${x}vw;top:${y}vh;background:${FW_COLORS[Math.floor(Math.random()*FW_COLORS.length)]};--fx:${Math.cos(a)*d}px;--fy:${Math.sin(a)*d}px;animation-duration:${0.6+Math.random()*0.6}s;`;document.body.appendChild(fw);setTimeout(()=>fw.remove(),1500);},i*20);}}
function setActiveStyle(el,on){if(on){el.style.border=`2px solid ${LAV}`;el.style.background='#fff';el.style.color=LAV;el.style.fontWeight='700';}else{el.style.border='1.5px solid #ddd';el.style.background='#fff';el.style.color='#999';el.style.fontWeight='400';}}
const SUPA_URL='https://fpogybpfoqvyncbloxzl.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwb2d5YnBmb3F2eW5jYmxveHpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzODgyMjIsImV4cCI6MjA4OTk2NDIyMn0.5ah_8KthVeBOgSZz9qrE1iuRBTFpj2aBaCBl3Lduaig';
async function addScore(name,topic,difficulty,moves,time){try{const res=await fetch(`${SUPA_URL}/rest/v1/scores`,{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`,'Prefer':'return=minimal'},body:JSON.stringify({name,theme:topic,difficulty,moves,time})});if(!res.ok){const txt=await res.text();console.error('Save failed:',res.status,txt);}else{console.log('Score saved! 🌸');}}catch(e){console.error('Score save failed',e);}renderLeaderboard();}
async function renderLeaderboard(){const body=document.getElementById('lb-body'),empty=document.getElementById('lb-empty');body.innerHTML='<tr><td colspan="6" style="text-align:center;color:#bbb;font-style:italic;padding:8px">Loading... 🌸</td></tr>';try{const res=await fetch(`${SUPA_URL}/rest/v1/scores?select=*&order=moves.asc&limit=10`,{headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`,'Content-Type':'application/json'}});if(!res.ok){throw new Error('HTTP '+res.status);}const scores=await res.json();body.innerHTML='';if(!Array.isArray(scores)||!scores.length){empty.style.display='block';return;}empty.style.display='none';const medals=['🥇','🥈','🥉'];scores.forEach((r,i)=>{const tr=document.createElement('tr');tr.innerHTML=`<td>${medals[i]||i+1}</td><td>${r.name||'?'}</td><td>${r.theme||'?'}</td><td>${r.difficulty||'?'}</td><td>${r.moves||'?'}</td><td>${r.time||'?'}</td>`;body.appendChild(tr);});}catch(e){console.error('Leaderboard fetch error:',e);body.innerHTML='<tr><td colspan="6" style="text-align:center;color:#bbb;font-style:italic;padding:8px">Could not load scores 🌸</td></tr>';}}
function showNameModal(score){pendingScore=score;document.getElementById('name-input').value='';document.getElementById('name-modal').classList.add('show');setTimeout(()=>document.getElementById('name-input').focus(),100);}
function submitScore(){const name=document.getElementById('name-input').value.trim()||'Anonymous';document.getElementById('name-modal').classList.remove('show');if(pendingScore){addScore(name,pendingScore.topic,pendingScore.difficulty,pendingScore.moves,pendingScore.time);pendingScore=null;}}
document.getElementById('name-submit').addEventListener('click',submitScore);
document.getElementById('name-input').addEventListener('keydown',e=>{if(e.key==='Enter')submitScore();});
document.getElementById('lb-clear').addEventListener('click',async()=>{try{await fetch(`${SUPA_URL}/rest/v1/scores?id=gte.0`,{method:'DELETE',headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`}});}catch(e){}renderLeaderboard();});
function init(){clearInterval(timer);seconds=0;moves=0;matched=0;flipped=[];locked=false;started=false;document.getElementById('moves').textContent='0';document.getElementById('matched').textContent='0';document.getElementById('win-screen').classList.remove('show');document.getElementById('grid-wrap').classList.remove('hide');const pool=shuffle([...THEMES[currentTopic].emoji]).slice(0,totalPairs);if(pool.length<totalPairs)return;const cards=shuffle([...pool,...pool]);const grid=document.getElementById('grid');grid.innerHTML='';const cols=totalPairs===8?4:totalPairs===10?5:6;grid.className='cols-'+cols;cards.forEach(emoji=>{const card=document.createElement('div');card.className='card';card.dataset.emoji=emoji;card.innerHTML=`<div class="card-inner"><div class="card-front">?</div><div class="card-back">${emoji}</div></div>`;card.addEventListener('click',onCardClick);grid.appendChild(card);});}
function onCardClick(e){const card=e.currentTarget;if(locked||card.classList.contains('flipped')||card.classList.contains('matched'))return;if(!started){started=true;clearInterval(timer);timer=setInterval(()=>seconds++,1000);}playFlipSound();card.classList.add('flipped');flipped.push(card);if(flipped.length===2){locked=true;moves++;document.getElementById('moves').textContent=moves;const[a,b]=flipped;if(a.dataset.emoji===b.dataset.emoji){a.classList.add('matched');b.classList.add('matched');matched++;document.getElementById('matched').textContent=matched;playMatchSound();setTimeout(()=>{spawnConfetti(a);spawnConfetti(b);},350);flipped=[];locked=false;if(matched===totalPairs){clearInterval(timer);const finalTime=formatTime(seconds),finalMoves=moves;setTimeout(()=>{playWinSound();launchFireworks();setTimeout(()=>{document.getElementById('grid-wrap').classList.add('hide');document.getElementById('win-sub').textContent=`${finalMoves} moves · ${finalTime} · Amazing! 🌸`;document.getElementById('win-screen').classList.add('show');setTimeout(()=>showNameModal({topic:THEMES[currentTopic].label,difficulty:DIFF_LABEL[totalPairs],moves:finalMoves,time:finalTime}),800);},2000);},1200);}}else{setTimeout(()=>{a.classList.remove('flipped');b.classList.remove('flipped');flipped=[];locked=false;},900);}}}
document.getElementById('restart-btn').addEventListener('click',init);
document.getElementById('play-again').addEventListener('click',init);
document.querySelectorAll('.diff-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.diff-btn').forEach(b=>{b.classList.remove('active');setActiveStyle(b,false);});btn.classList.add('active');setActiveStyle(btn,true);totalPairs=parseInt(btn.dataset.size);init();});});
document.querySelectorAll('.topic-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.topic-btn').forEach(b=>{b.classList.remove('active');setActiveStyle(b,false);});btn.classList.add('active');setActiveStyle(btn,true);currentTopic=btn.dataset.topic;init();});});
document.querySelectorAll('.diff-btn.active,.topic-btn.active').forEach(btn=>setActiveStyle(btn,true));
renderLeaderboard();
init();
</script>
</body>
</html>
